name: Update README

on:
    schedule:
        - cron: "0 */6 * * *" # Every 6 hours
    workflow_dispatch: # Manual trigger

jobs:
    update-readme:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Fetch blog posts and update README
              run: |
                  set -euo pipefail
                  
                  RESPONSE=$(curl -sfL \
                    --retry 3 \
                    --retry-delay 5 \
                    --connect-timeout 30 \
                    --max-time 60 \
                    "https://metalops.dev/rss.xml") || {
                    echo "Failed to fetch RSS feed: $?"
                    exit 0
                  }

                  # Parse RSS XML to extract up to 5 posts
                  POSTS=$(echo "$RESPONSE" | sed 's/<item>/\n/g' | tail -n +2 | head -5 | while IFS= read -r block; do
                    title=$(echo "$block" | sed -n 's/.*<title>\([^<]*\)<\/title>.*/\1/p')
                    link=$(echo "$block" | sed -n 's/.*<link>\([^<]*\)<\/link>.*/\1/p')
                    desc=$(echo "$block" | sed -n 's/.*<description>\([^<]*\)<\/description>.*/\1/p' | cut -c1-100)
                    echo "- [$title]($link) — $desc"
                  done)

                  if [ -z "$POSTS" ]; then
                    echo "No valid blog posts found"
                    exit 0
                  fi

                  # Build the new blog post section
                  BLOG_SECTION="<!-- BLOG-POST-LIST:START -->"$'\n'"${POSTS}"$'\n'"<!-- BLOG-POST-LIST:END -->"

                  # Replace content between markers
                  awk -v new="$BLOG_SECTION" '
                    /<!-- BLOG-POST-LIST:START -->/{found=1; print new; next}
                    /<!-- BLOG-POST-LIST:END -->/{found=0; next}
                    !found
                  ' README.md > README.tmp && mv README.tmp README.md

            - name: Generate stats card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: stats
                  options: username=${{ github.repository_owner }}&show_icons=true
                  path: profile/stats.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate top languages card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: top-langs
                  options: username=${{ github.repository_owner }}&layout=compact&langs_count=25&hide=css,html,yacc,scss
                  path: profile/top-langs.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Commit and push if changed
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add README.md profile/*.svg
                  git diff --cached --quiet && exit 0
                  git commit -m "docs: update README stats and blog post"
                  git push
